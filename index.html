<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Arsip TIFF - GitHub Pages</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .card { max-width: 900px; margin: auto; background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        select { padding: 12px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; background: #444; color: white; margin-bottom: 20px; }
        canvas { max-width: 100%; height: auto; border-radius: 4px; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .info { margin-top: 10px; color: #aaa; font-size: 0.9em; }
        #loading { display: none; margin: 20px; font-style: italic; color: #ffca28; }
    </style>
</head>
<body>

<div class="card">
    <h2>Visualisasi Data Tahunan (.tif)</h2>
    
    <div>
        <label>Pilih Tahun: </label>
        <select id="yearSelect" onchange="loadTiff()">
            <!-- <option value="2023.tif">2023</option>
            <option value="2024.tif">2024</option> -->
            <option value="2025.tif">2025</option>
        </select>
    </div>

    <div id="loading">Sedang merender file TIFF...</div>
    <canvas id="tiffCanvas"></canvas>
    <div class="info" id="imgInfo">Menunggu library...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/utif.js/3.1.0/utif.min.js"></script>

<script>
    async function loadTiff() {
        // CEK APAKAH LIBRARY UTIF SUDAH TERMUAT
        if (typeof UTIF === "undefined") {
            document.getElementById('imgInfo').innerHTML = "<span style='color:red'>Error: Library UTIF belum termuat. Periksa koneksi internet!</span>";
            return;
        }

        const fileName = document.getElementById('yearSelect').value;
        const canvas = document.getElementById('tiffCanvas');
        const loading = document.getElementById('loading');
        const info = document.getElementById('imgInfo');
        const ctx = canvas.getContext('2d');

        loading.style.display = 'block';
        info.innerHTML = "Mengambil data: " + fileName;

        try {
            const response = await fetch(fileName);
            if (!response.ok) throw new Error("File " + fileName + " tidak ditemukan di server.");
            
            const buffer = await response.arrayBuffer();
            const ifds = UTIF.decode(buffer);
            
            UTIF.decodeImage(buffer, ifds[0]);
            const rgba = UTIF.toRGBA8(ifds[0]);

            canvas.width = ifds[0].width;
            canvas.height = ifds[0].height;

            const imgData = ctx.createImageData(ifds[0].width, ifds[0].height);
            imgData.data.set(rgba);
            ctx.putImageData(imgData, 0, 0);
            
            loading.style.display = 'none';
            info.innerHTML = `Berhasil memuat ${fileName} (${ifds[0].width}x${ifds[0].height} px)`;

        } catch (err) {
            console.error(err);
            loading.style.display = 'none';
            info.innerHTML = `<span style='color:red'>Gagal: ${err.message}</span>`;
        }
    }

    // Pastikan fungsi dipanggil SETELAH halaman dan library benar-benar siap
    window.addEventListener('load', () => {
        // Beri jeda sedikit agar library UTIF terinisialisasi sempurna
        setTimeout(loadTiff, 500);
    });
</script>

</body>
</html>
