<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Visualisasi GeoTIFF - Diperbaiki</title>
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #222; color: white; text-align: center; padding: 10px; }
        .card { max-width: 1000px; margin: auto; background: #333; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        select { padding: 10px; border-radius: 6px; background: #555; color: white; margin-bottom: 20px; font-size: 16px; cursor: pointer; }
        .canvas-container { max-width: 100%; max-height: 80vh; overflow: auto; border: 2px solid #666; margin-top: 10px; background: black;}
        canvas { display: block; margin: auto; max-width: 100%; height: auto; }
        .info { margin-top: 10px; color: #ccc; font-size: 0.9em; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h3>Data Sawit Tahunan (.tif)</h3>
    
    <select id="yearSelect" onchange="loadAndFixTiff()">
        <option value="2023.tif">2023</option>
        <option value="2024.tif">2024</option>
        <option value="2025.tif">2025</option>
    </select>

    <div class="canvas-container">
        <canvas id="tiffCanvas"></canvas>
    </div>
    
    <div id="status" class="info">Memuat data...</div>
</div>

<script>
    async function loadAndFixTiff() {
        const fileName = document.getElementById('yearSelect').value;
        const canvas = document.getElementById('tiffCanvas');
        const status = document.getElementById('status');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // Reset canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        status.innerHTML = `Membaca ${fileName}...`;

        try {
            const response = await fetch(fileName);
            if (!response.ok) throw new Error("Gagal mengunduh file.");
            
            const arrayBuffer = await response.arrayBuffer();
            const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
            const image = await tiff.getImage();
            
            const width = image.getWidth();
            const height = image.getHeight();
            
            // Baca data raster mentah, jangan readRGB()
            const rasterData = await image.readRasters({ pool: new GeoTIFF.Pool() });
            
            status.innerHTML = `Resolusi: ${width}x${height}px. Menormalisasi data...`;

            // Setup Canvas
            canvas.width = width;
            canvas.height = height;
            const imageData = ctx.createImageData(width, height);
            
            // LOGIC UTAMA: Tentukan tipe data dan normalisasi
            const band0 = rasterData[0]; // Kita asumsikan Band 1 adalah data utama (Grayscale)
            
            // 1. Cari nilai Max mentah
            let maxVal = 0;
            for (let i = 0; i < band0.length; i++) {
                if (band0[i] > maxVal) maxVal = band0[i];
            }

            // Fallback jika maxVal terlalu kecil (biar gak error/noise)
            if (maxVal < 255) maxVal = 255; 

            //console.log("Max raw value:", maxVal); // Untuk debug

            // 2. Normalisasi dan masukkan ke ImageData
            for (let i = 0, j = 0; i < band0.length; i++, j += 4) {
                // Skala: (nilaiMentah / maxMentah) * 255
                // Gunakan Math.round agar integer 8-bit valid
                let scaledVal = Math.round((band0[i] / maxVal) * 255);
                
                // Pastikan nilai di dalam rentang 0-255
                if (scaledVal > 255) scaledVal = 255;
                if (scaledVal < 0 || isNaN(scaledVal)) scaledVal = 0;

                imageData.data[j]     = scaledVal; // R
                imageData.data[j + 1] = scaledVal; // G
                imageData.data[j + 2] = scaledVal; // B
                imageData.data[j + 3] = 255;       // Alpha (Opaque)
            }

            ctx.putImageData(imageData, 0, 0);
            status.innerHTML = `Selesai memuat ${fileName}. Max Value mentah: ${maxVal}`;

        } catch (err) {
            console.error(err);
            status.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
        }
    }

    // Jalankan saat load
    window.onload = loadAndFixTiff;
</script>

</body>
</html>
